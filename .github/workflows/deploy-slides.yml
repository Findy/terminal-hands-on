name: Deploy slides to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-slides
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # slides/package.json がテーマ/アドオンを
      # link:../../../mozumasu/findy-slidev/... で参照しているため、
      # CI のディレクトリ構造をローカルの
      # github.com/{Findy/terminal-hands-on,mozumasu/findy-slidev} に合わせる
      - name: Checkout deck
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: Findy/terminal-hands-on
          persist-credentials: false

      - name: Checkout theme repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: mozumasu/findy-slidev
          ref: main
          path: mozumasu/findy-slidev
          token: ${{ secrets.FINDY_SLIDEV_READ_TOKEN }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: Findy/terminal-hands-on/slides/package.json

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            Findy/terminal-hands-on/slides/pnpm-lock.yaml
            mozumasu/findy-slidev/pnpm-lock.yaml

      - name: Install theme dependencies
        working-directory: mozumasu/findy-slidev
        run: pnpm install --frozen-lockfile

      - name: Install slides dependencies
        working-directory: Findy/terminal-hands-on/slides
        run: pnpm install --frozen-lockfile

      - name: Build slides
        working-directory: Findy/terminal-hands-on/slides
        run: pnpm build

      # Slidev が生成する Netlify 用 _redirects を削除。
      # SPA fallback は wrangler.jsonc の not_found_handling が担う
      - name: Remove Netlify redirects file
        working-directory: Findy/terminal-hands-on/slides
        run: rm -f dist/_redirects

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: Findy/terminal-hands-on/slides
